<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- Gold Gradient for Cap/Emblems -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>

    <!-- White Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Decorative Inner Border -->
  <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="6" />

  <!-- Center Emblem Group -->
  <g transform="translate(0, 10)">
    
    <!-- Glowing Hebrew Character (Alef) -->
    <text x="360" y="320" font-family="'Assistant', sans-serif" font-size="160" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">א</text>
    
    <!-- Glowing Japanese Character (A) -->
    <text x="150" y="320" font-family="'Noto Sans JP', sans-serif" font-size="140" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">あ</text>
    
    <!-- Graduation Cap / Hat (LingoStudy Emblem) -->
    <g transform="translate(256, 120)" fill="url(#goldGrad)">
      <!-- Diamond Board -->
      <polygon points="0,-60 110,-15 0,30 -110,-15" />
      
      <!-- Cap Base -->
      <path d="M-60,-5 L-60,25 C-60,45 60,45 60,25 L60,-5 C60,5 50,15 0,15 C-50,15 -60,5 -60,-5 Z" />
      
      <!-- Tassel -->
      <path d="M0,-15 L75,10 L75,45" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
      <circle cx="75" cy="50" r="8" />
    </g>

    <!-- Book/Platform line -->
    <path d="M 100 370 C 180 390 230 390 256 375 C 282 390 332 390 412 370" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="8" stroke-linecap="round" />
    <path d="M 100 390 C 180 410 230 410 256 395 C 282 410 332 410 412 390" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
